<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      min-height: 100vh;
    }

    .app {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      margin: 0 0 20px;
      color: #64748b;
    }

    .todo-form {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .todo-form input {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    .todo-form input:focus {
      border-color: #6366f1;
    }

    .todo-form button,
    .filter-btn,
    .danger-btn,
    .action-btn {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .todo-form button {
      padding: 14px 18px;
      background: #4f46e5;
      color: white;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .filter-btn,
    .danger-btn {
      padding: 10px 14px;
      background: #e2e8f0;
      color: #0f172a;
    }

    .filter-btn.active {
      background: #4f46e5;
      color: white;
    }

    .danger-btn {
      background: #fee2e2;
      color: #b91c1c;
    }

    .todo-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .todo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 12px;
      background: #f8fafc;
    }

    .todo-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .todo-text {
      word-break: break-word;
      font-size: 16px;
    }

    .completed .todo-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .todo-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      padding: 8px 12px;
      background: #e2e8f0;
    }

    .action-btn.delete {
      background: #fecaca;
      color: #991b1b;
    }

    .footer {
      margin-top: 8px;
      color: #475569;
      font-size: 14px;
    }

    .empty-state {
      text-align: center;
      color: #94a3b8;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>To-Do List</h1>
      <p class="subtitle">Simple task manager using HTML, CSS, and JavaScript</p>

      <form id="todo-form" class="todo-form">
        <input id="todo-input" type="text" placeholder="Enter a task..." autocomplete="off" />
        <button type="submit">Add</button>
      </form>

      <div class="toolbar">
        <button class="filter-btn active" data-filter="all" type="button">All</button>
        <button class="filter-btn" data-filter="pending" type="button">Pending</button>
        <button class="filter-btn" data-filter="completed" type="button">Completed</button>
        <button id="clear-completed" class="danger-btn" type="button">Clear Completed</button>
      </div>

      <ul id="todo-list" class="todo-list"></ul>

      <div class="footer">
        <span id="task-count">0 tasks left</span>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("todo-form");
    const input = document.getElementById("todo-input");
    const list = document.getElementById("todo-list");
    const taskCount = document.getElementById("task-count");
    const filterButtons = document.querySelectorAll(".filter-btn");
    const clearCompletedBtn = document.getElementById("clear-completed");

    let todos = JSON.parse(localStorage.getItem("todos")) || [];
    let currentFilter = "all";

    function saveTodos() {
      localStorage.setItem("todos", JSON.stringify(todos));
    }

    function updateTaskCount() {
      const pendingCount = todos.filter((todo) => !todo.completed).length;
      taskCount.textContent = `${pendingCount} task${pendingCount !== 1 ? "s" : ""} left`;
    }

    function getFilteredTodos() {
      if (currentFilter === "pending") {
        return todos.filter((todo) => !todo.completed);
      }

      if (currentFilter === "completed") {
        return todos.filter((todo) => todo.completed);
      }

      return todos;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function renderTodos() {
      list.innerHTML = "";
      const filteredTodos = getFilteredTodos();

      if (filteredTodos.length === 0) {
        list.innerHTML = '<li class="empty-state">No tasks to display</li>';
        updateTaskCount();
        return;
      }

      filteredTodos.forEach((todo) => {
        const li = document.createElement("li");
        li.className = `todo-item ${todo.completed ? "completed" : ""}`;

        li.innerHTML = `
          <div class="todo-left">
            <input
              type="checkbox"
              class="toggle-checkbox"
              data-id="${todo.id}"
              ${todo.completed ? "checked" : ""}
            />
            <span class="todo-text">${escapeHtml(todo.text)}</span>
          </div>
          <div class="todo-actions">
            <button class="action-btn delete" data-id="${todo.id}">Delete</button>
          </div>
        `;

        list.appendChild(li);
      });

      updateTaskCount();
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const text = input.value.trim();
      if (!text) return;

      todos.unshift({
        id: Date.now(),
        text: text,
        completed: false
      });

      saveTodos();
      renderTodos();
      input.value = "";
    });

    list.addEventListener("click", function (event) {
      if (event.target.classList.contains("delete")) {
        const id = Number(event.target.dataset.id);
        todos = todos.filter((todo) => todo.id !== id);
        saveTodos();
        renderTodos();
      }
    });

    list.addEventListener("change", function (event) {
      if (event.target.classList.contains("toggle-checkbox")) {
        const id = Number(event.target.dataset.id);

        todos = todos.map((todo) => {
          if (todo.id === id) {
            return { ...todo, completed: event.target.checked };
          }
          return todo;
        });

        saveTodos();
        renderTodos();
      }
    });

    filterButtons.forEach((button) => {
      button.addEventListener("click", function () {
        currentFilter = button.dataset.filter;

        filterButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");

        renderTodos();
      });
    });

    clearCompletedBtn.addEventListener("click", function () {
      todos = todos.filter((todo) => !todo.completed);
      saveTodos();
      renderTodos();
    });

    renderTodos();
  </script>
</body>
</html>
